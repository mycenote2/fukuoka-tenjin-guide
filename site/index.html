<style>
  :root{
    --fig-green:#0ACF83;
    --fig-purple:#A259FF;
    --fig-blue:#1ABCFE;
    --lime:#E0FE6B;
    --navy:#191A23;
    --navy-deep:#0e0f16;
    --cream:#FCFCFC;
    --paper:#ffffff;
    --ink:#191A23;
    --sub:#6b6c76;
    --line:#e8e8ec;
    --shadow: 0 10px 30px rgba(25,26,35,0.08);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Pretendard', 'Nanum Gothic', sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .wrap{ max-width:640px; margin:0 auto; padding:0 18px 60px; }
  .hero{
    background:var(--navy);
    color:#fff;
    border-radius:0 0 28px 28px;
    padding:52px 26px 40px;
    text-align:center;
    background-image:
      radial-gradient(circle at 18% 22%, rgba(162,89,255,0.28), transparent 42%),
      radial-gradient(circle at 82% 12%, rgba(26,188,254,0.24), transparent 40%);
  }
  .hero .badge{
    display:inline-block;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
    padding:5px 13px; border-radius:999px;
    font-size:12px; font-weight:600; letter-spacing:0.02em;
    margin-bottom:16px;
  }
  .hero h1{
    font-family:'Pretendard', sans-serif; font-weight:800;
    font-size:30px; line-height:1.25; margin-bottom:12px;
  }
  .hero h1 .accent{ color:var(--fig-blue); }
  .hero p{ color:rgba(255,255,255,0.82); font-size:14.5px; max-width:400px; margin:0 auto; }
  .section-label{
    font-size:12.5px; font-weight:700; color:var(--sub);
    letter-spacing:0.04em; text-transform:uppercase;
    margin:34px 4px 14px;
  }
  .city-grid{ display:grid; gap:14px; }
  a.city-card{
    display:flex; align-items:center; gap:15px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px 18px;
    text-decoration:none; color:inherit;
    box-shadow:var(--shadow);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  a.city-card:hover{ transform:translateY(-2px); box-shadow:0 14px 34px rgba(25,26,35,0.12); }
  .city-emoji{
    width:52px; height:52px; flex:0 0 52px;
    display:grid; place-items:center;
    background:linear-gradient(135deg, #f1e8ff, #e8f7ff);
    border-radius:14px; font-size:26px;
  }
  .city-body{ flex:1; min-width:0; }
  .city-body h2{ font-size:17px; font-weight:800; margin-bottom:3px; }
  .city-body p{ font-size:13px; color:var(--sub); }
  .city-arrow{ color:var(--fig-purple); font-weight:800; font-size:18px; }
  .city-card.soon{
    opacity:0.62; cursor:default; box-shadow:none;
    background:#f7f7f9; border-style:dashed;
  }
  .city-card.soon:hover{ transform:none; box-shadow:none; }
  .city-card.soon .city-emoji{ background:#ececf1; filter:grayscale(0.3); }
  .soon-tag{
    display:inline-block; font-size:11px; font-weight:700;
    color:var(--sub); background:#e9e9ef;
    padding:2px 8px; border-radius:999px; margin-top:4px;
  }
  footer{
    margin-top:40px; text-align:center;
    font-size:12.5px; color:var(--sub); line-height:1.7;
  }
  footer a{ color:var(--sub); }
</style>
</head>
<body>
  <div class="hero">
    <span class="badge">🛍️ SHOPPING SANCHAEK</span>
    <h1>도시별 <span class="accent">쇼핑 산책</span> 가이드</h1>
    <p>가고 싶은 도시를 고르면 매장 지도·브랜드 체크리스트·최단 도보 동선까지 한 번에 짜드려요.</p>
  </div>

  <div class="wrap">
    <div class="section-label">지역 선택</div>
    <div class="city-grid">

      <a class="city-card" href="/fukuoka-tenjin/">
        <div class="city-emoji">🇯🇵</div>
        <div class="city-body">
          <h2>후쿠오카 · 텐진</h2>
          <p>텐진역~다이묘 거리 · 매장 18곳 · 브랜드 88개</p>
        </div>
        <div class="city-arrow">→</div>
      </a>

      <div class="city-card soon">
        <div class="city-emoji">🗼</div>
        <div class="city-body">
          <h2>도쿄 · 신주쿠</h2>
          <p>준비 중이에요</p>
          <span class="soon-tag">COMING SOON</span>
        </div>
      </div>

    </div>

    <footer>
      원하는 도시가 있으면 각 가이드의 요청 게시판에 남겨주세요.<br>
      © 2026 쇼핑 산책 · forijuni.com
    </footer>
  </div>
</body>
</html>
